<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Passwort zurücksetzen — VOXEMPIRE</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #12151c;
        color: #e6e9ef;
        font: 16px/1.6 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      .box {
        max-width: 420px;
        width: 90%;
        padding: 32px;
        text-align: center;
      }
      h1 {
        color: #e9c46a;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 12px;
        margin: 8px 0;
        border-radius: 8px;
        border: 1px solid #2a3140;
        background: #1a1f29;
        color: #e6e9ef;
        font-size: 16px;
      }
      button {
        width: 100%;
        padding: 12px;
        margin-top: 8px;
        background: #e9c46a;
        color: #12151c;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        font-size: 16px;
        cursor: pointer;
      }
      a {
        color: #e9c46a;
      }
      .muted {
        color: #93a0b4;
      }
      .red {
        color: #e07a7a;
      }
      .ok {
        color: #7ac77a;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Passwort zurücksetzen</h1>
      <div id="form">
        <input id="pw1" type="password" placeholder="Neues Passwort" autocomplete="new-password" />
        <input id="pw2" type="password" placeholder="Passwort wiederholen" autocomplete="new-password" />
        <button id="submit">Passwort setzen</button>
        <p id="msg" class="muted"></p>
      </div>
    </div>
    <script>
      const token = new URLSearchParams(location.search).get("token");
      const msg = document.getElementById("msg");
      if (!token) {
        msg.textContent = "Kein Reset-Token im Link.";
        msg.className = "red";
      }
      document.getElementById("submit").addEventListener("click", async () => {
        const p1 = document.getElementById("pw1").value;
        const p2 = document.getElementById("pw2").value;
        if (p1.length < 4) {
          msg.textContent = "Passwort: mindestens 4 Zeichen.";
          msg.className = "red";
          return;
        }
        if (p1 !== p2) {
          msg.textContent = "Die Passwörter stimmen nicht überein.";
          msg.className = "red";
          return;
        }
        try {
          const res = await fetch("/api/account/reset", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token, newPass: p1 }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.error || "Zurücksetzen fehlgeschlagen.");
          document.getElementById("form").innerHTML =
            '<p class="ok">✅ Passwort geändert.</p><p><a href="/">Zum Login</a></p>';
        } catch (e) {
          msg.textContent = e.message;
          msg.className = "red";
        }
      });
    </script>
  </body>
</html>
